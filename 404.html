<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Страница не найдена — Тридевятое Царство</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
/* Подключаем базовые стили из главного файла */
:root{--bg:#00281e;--bg2:#001510;--gold:#e6be32;--white:#f8f4e8;--gb:rgba(230,190,50,.18);}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--white);font-family:'Cormorant Garamond',serif;overflow:hidden;height:100vh;display:flex;flex-direction:column}
#pcanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:.35}

/* Стили заголовка (упрощенные для 404) */
.hdr{position:fixed;top:0;left:0;right:0;padding:16px 28px;display:flex;align-items:center;justify-content:center;z-index:1000;}
.hdr-logo{height:52px;width:52px;object-fit:contain;filter:drop-shadow(0 0 10px rgba(230,190,50,.3));opacity:.7;transition:opacity .3s}
.hdr-logo:hover{opacity:1}

/* Контент 404 */
#error-sec{position:relative;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 24px;z-index:1}
#error-sec::after{content:'';position:absolute;inset:0;background:radial-gradient(circle,rgba(0,40,30,.2) 0%,var(--bg) 80%);z-index:-1}
.hero-h1{font-family:'Cinzel Decorative',serif;font-size:clamp(40px,10vw,120px);font-weight:700;line-height:1;text-shadow:0 0 70px rgba(230,190,50,.28);margin-bottom:10px;animation:fadeUp 1s ease forwards}
.hero-h1 span{color:var(--gold);}
.slabel{font-family:'Cinzel',serif;font-size:12px;letter-spacing:6px;text-transform:uppercase;color:var(--gold);margin-bottom:20px;display:block;animation:fadeUp 1s ease .2s forwards;opacity:0}
.hero-sub{font-size:clamp(18px,2.5vw,26px);font-weight:300;font-style:italic;color:rgba(248,244,232,.82);max-width:560px;line-height:1.65;margin-bottom:44px;animation:fadeUp 1s ease .4s forwards;opacity:0}
.cta{display:inline-flex;align-items:center;justify-content:center;background:transparent;border:1px solid var(--gold);color:var(--gold);text-decoration:none;font-family:'Cinzel',serif;font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;padding:15px 38px;border-radius:3px;transition:all .3s;animation:fadeUp 1s ease .6s forwards;opacity:0}
.cta:hover{background:var(--gold);color:var(--bg2);box-shadow:0 0 40px rgba(230,190,50,.4)}

@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<canvas id="pcanvas"></canvas>

<header class="hdr">
  <a href="index.html">
    <img src="1.png" alt="Тридевятое Царство" class="hdr-logo" onerror="this.outerHTML='<div style=\'font-family:Cinzel Decorative,serif;font-size:24px;color:#e6be32;text-decoration:none;\'>ТЦ</div>'">
  </a>
</header>

<section id="error-sec">
  <span class="slabel">Ошибка</span>
  <h1 class="hero-h1">4<span>0</span>4</h1>
  <p class="hero-sub">Там на неведомых дорожках...<br>следы невиданных страниц.</p>
  <a href="index.html" class="cta">Вернуться в Царство</a>
</section>

<script>
// Тот же код частиц для сохранения атмосферы
(function(){
  const cv=document.getElementById('pcanvas'),ctx=cv.getContext('2d');
  let W,H,pts=[];
  function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight}
  function mk(){return{x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.8+.4,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25-.08,a:Math.random()*.8+.2,c:Math.random()>.3?'#e6be32':'#ffffff',p:Math.random()*Math.PI*2}}
  resize();pts=Array.from({length:100},mk);
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.p+=.018;p.x+=p.vx;p.y+=p.vy;
      if(p.y<-4)p.y=H+4;if(p.x<-4)p.x=W+4;if(p.x>W+4)p.x=-4;
      const a=p.a*(0.65+0.35*Math.sin(p.p));
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.c+(Math.round(a*255).toString(16).padStart(2,'0'));
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);draw();
})();
</script>
</body>
</html>
