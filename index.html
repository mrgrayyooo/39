<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ТРИДЕВЯТОЕ ЦАРСТВО — Акт I</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  height: 100vh;
  background: url("2.jpg") center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  overflow: hidden;
}

/* затемнение фона */
body::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  z-index: 0;
}

/* --- БУРГЕР МЕНЮ И НАВИГАЦИЯ --- */
.header-nav {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  padding: 20px 30px;
  display: flex;
  justify-content: flex-end;
  z-index: 1000;
}

.burger {
  width: 45px;
  height: 45px;
  background: rgba(255, 255, 255, 0.9);
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  z-index: 1001;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  transition: transform 0.3s ease;
}

.burger:hover {
  transform: scale(1.05);
}

.burger span {
  display: block;
  width: 20px;
  height: 2px;
  background-color: #002b22; /* Тот самый темно-зеленый цвет */
  border-radius: 2px;
  transition: all 0.3s ease;
}

/* Анимация превращения в крестик */
.burger.active span:nth-child(1) {
  transform: translateY(7px) rotate(45deg);
}
.burger.active span:nth-child(2) {
  opacity: 0;
}
.burger.active span:nth-child(3) {
  transform: translateY(-7px) rotate(-45deg);
}

.menu {
  position: fixed;
  top: 0;
  right: -100%;
  width: 100%;
  height: 100%;
  background: rgba(0, 43, 34, 0.95); /* Зеленый цвет для фона меню */
  backdrop-filter: blur(10px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 30px;
  transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 999;
}

@media (min-width: 768px) {
  .menu {
    width: 350px; /* На ПК выезжает сбоку */
    border-left: 1px solid rgba(255,255,255,0.1);
  }
}

.menu.active {
  right: 0;
}

.menu a {
  color: #fff;
  text-decoration: none;
  font-size: 22px;
  font-weight: 300;
  letter-spacing: 2px;
  text-transform: uppercase;
  transition: opacity 0.3s;
}

.menu a:hover {
  opacity: 0.6;
}
/* ------------------------------- */

/* карточка */
.card {
  position: relative;
  width: 340px;
  padding: 28px;
  border-radius: 20px;
  backdrop-filter: blur(20px);
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
  text-align: center;
  animation: fadeIn 1.2s ease;
  z-index: 10; /* Чтобы карточка была поверх фона, но под меню */
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.title {
  font-size: 16px;
  letter-spacing: 3px;
  text-transform: uppercase;
  opacity: 0.8;
}

.track {
  font-size: 24px;
  margin-top: 10px;
  font-weight: 600;
}

/* ОБЛОЖКА */
.cover {
  margin: 20px auto;
  width: 180px;
  height: 180px;
  border-radius: 16px;
  background: url("1.png") center/contain no-repeat;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.controls {
  margin-top: 20px;
}

.play-btn {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, #ffffff, #cccccc);
  display: grid;
  place-items: center;
  cursor: pointer;
  box-shadow: 0 8px 25px rgba(0,0,0,0.6);
  margin: 0 auto;
}

.play-btn:hover {
  transform: scale(1.1);
}

.play-btn svg {
  width: 26px;
  height: 26px;
  display: block;
  fill: #000; /* Цвет иконки плей */
}

/* ПРОГРЕСС */
.progress {
  margin-top: 20px;
  width: 100%;
  height: 6px;
  background: rgba(255,255,255,0.15);
  border-radius: 10px;
  cursor: pointer;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: #fff;
  border-radius: 10px;
  pointer-events: none; /* Чтобы клик срабатывал точно по родительскому блоку */
}

.time {
  margin-top: 8px;
  font-size: 12px;
  opacity: 0.7;
  display: flex;
  justify-content: space-between;
}

</style>
</head>

<body>

<header class="header-nav">
  <div class="burger" id="burger">
    <span></span>
    <span></span>
    <span></span>
  </div>
</header>

<nav class="menu" id="menu">
  <a href="#">О нас</a>
  <a href="#">Контакты</a>
  <a href="#">Продукция</a>
  <a href="#">Услуги</a>
  <a href="#">Партнерам</a>
</nav>

<div class="card">
  <div class="title">ТРИДЕВЯТОЕ ЦАРСТВО</div>
  <div class="track">Сказка о царе Салтане</div>

  <div class="cover"></div>

  <div class="controls">
    <button class="play-btn" id="play">
      <svg id="icon" viewBox="0 0 24 24">
        <path d="M8 5v14l11-7z"/>
      </svg>
    </button>

    <div class="progress" id="progress">
      <div class="progress-bar" id="bar"></div>
    </div>

    <div class="time">
      <span id="current">0:00</span>
      <span id="duration">0:00</span>
    </div>
  </div>
</div>

<audio id="audio" src="39k.m4a"></audio>

<script>
// --- ЛОГИКА МЕНЮ ---
const burger = document.getElementById('burger');
const menu = document.getElementById('menu');

burger.addEventListener('click', () => {
  burger.classList.toggle('active');
  menu.classList.toggle('active');
});

// Закрытие меню при клике на любую из заглушек
document.querySelectorAll('.menu a').forEach(link => {
  link.addEventListener('click', (e) => {
    e.preventDefault(); // Предотвращаем прыжок страницы наверх из-за "#"
    burger.classList.remove('active');
    menu.classList.remove('active');
  });
});

// --- ЛОГИКА ПЛЕЕРА ---
const audio = document.getElementById('audio');
const playBtn = document.getElementById('play');
const icon = document.getElementById('icon');
const bar = document.getElementById('bar');
const progress = document.getElementById('progress');
const current = document.getElementById('current');
const duration = document.getElementById('duration');

playBtn.onclick = () => {
  if (audio.paused) {
    audio.play().catch(() => {});
    icon.innerHTML = '<path d="M6 5h4v14H6zm8 0h4v14h-4z"/>'; // pause
  } else {
    audio.pause();
    icon.innerHTML = '<path d="M8 5v14l11-7z"/>'; // play
  }
};

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const percent = (audio.currentTime / audio.duration) * 100;
  bar.style.width = percent + "%";
  current.textContent = formatTime(audio.currentTime);
});

audio.addEventListener('loadedmetadata', () => {
  duration.textContent = formatTime(audio.duration);
});

progress.onclick = (e) => {
  const width = progress.clientWidth;
  const clickX = e.offsetX;
  audio.currentTime = (clickX / width) * audio.duration;
};

function formatTime(sec) {
  if (isNaN(sec)) return "0:00";
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60).toString().padStart(2, '0');
  return m + ":" + s;
}
</script>

</body>
</html>
