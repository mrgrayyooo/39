<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ТРИДЕВЯТОЕ ЦАРСТВО — Акт I</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  height: 100vh;
  background: url("2.jpg") center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  overflow: hidden;
}

/* затемнение фона */
body::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(6px);
}

/* карточка */
.card {
  position: relative;
  width: 340px;
  padding: 28px;
  border-radius: 20px;
  backdrop-filter: blur(20px);
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
  text-align: center;
  animation: fadeIn 1.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.title {
  font-size: 16px;
  letter-spacing: 3px;
  text-transform: uppercase;
  opacity: 0.8;
}

.track {
  font-size: 24px;
  margin-top: 10px;
  font-weight: 600;
}

/* ОБЛОЖКА */
.cover {
  margin: 20px auto;
  width: 180px;
  height: 180px;
  border-radius: 16px;
  background: url("1.png") center/cover no-repeat;
  box-shadow: 0 10px 40px rgba(0,0,0,0.8);
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.controls {
  margin-top: 20px;
}

/* КНОПКА */
.play-btn {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, #ffffff, #cccccc);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 8px 25px rgba(0,0,0,0.6);
  transition: 0.2s;
}

.play-btn:hover {
  transform: scale(1.1);
}

/* SVG */
.play-btn svg {
  width: 28px;
  height: 28px;
  fill: #000;
}

/* ПРОГРЕСС */
.progress {
  margin-top: 20px;
  width: 100%;
  height: 6px;
  background: rgba(255,255,255,0.15);
  border-radius: 10px;
  cursor: pointer;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: #fff;
  border-radius: 10px;
}

.time {
  margin-top: 8px;
  font-size: 12px;
  opacity: 0.7;
  display: flex;
  justify-content: space-between;
}

</style>
</head>

<body>

<div class="card">
  <div class="title">ТРИДЕВЯТОЕ ЦАРСТВО</div>
  <div class="track">Сказка о царе Салтане</div>

  <div class="cover"></div>

  <div class="controls">
    <button class="play-btn" id="play">
      <!-- SVG PLAY -->
      <svg id="icon" viewBox="0 0 24 24">
        <path d="M8 5v14l11-7z"/>
      </svg>
    </button>

    <div class="progress" id="progress">
      <div class="progress-bar" id="bar"></div>
    </div>

    <div class="time">
      <span id="current">0:00</span>
      <span id="duration">0:00</span>
    </div>
  </div>
</div>

<audio id="audio" src="39k.m4a"></audio>

<script>
const audio = document.getElementById('audio');
const playBtn = document.getElementById('play');
const icon = document.getElementById('icon');
const bar = document.getElementById('bar');
const progress = document.getElementById('progress');
const current = document.getElementById('current');
const duration = document.getElementById('duration');

playBtn.onclick = () => {
  if (audio.paused) {
    audio.play().catch(() => {});
    icon.innerHTML = '<path d="M6 5h4v14H6zm8 0h4v14h-4z"/>'; // pause
  } else {
    audio.pause();
    icon.innerHTML = '<path d="M8 5v14l11-7z"/>'; // play
  }
};

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const percent = (audio.currentTime / audio.duration) * 100;
  bar.style.width = percent + "%";
  current.textContent = formatTime(audio.currentTime);
});

audio.addEventListener('loadedmetadata', () => {
  duration.textContent = formatTime(audio.duration);
});

progress.onclick = (e) => {
  const width = progress.clientWidth;
  const clickX = e.offsetX;
  audio.currentTime = (clickX / width) * audio.duration;
};

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60).toString().padStart(2, '0');
  return m + ":" + s;
}
</script>

</body>
</html>
