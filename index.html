<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Zalessky Farmer — 39k</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Шрифт -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(180deg, #0b0f0c, #1a2b1d, #2e4a2f);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e7f5e8;
      overflow: hidden;
    }

    /* зерно */
    body::after {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      background: url("https://grainy-gradients.vercel.app/noise.svg");
      opacity: 0.08;
      animation: grain 8s steps(10) infinite;
    }

    @keyframes grain {
      0%,100% { transform: translate(0,0) }
      25% { transform: translate(-5%,5%) }
      50% { transform: translate(-10%,0) }
      75% { transform: translate(5%,-5%) }
    }

    .card {
      position: relative;
      width: 340px;
      padding: 28px;
      border-radius: 20px;
      backdrop-filter: blur(20px);
      background: rgba(20, 35, 22, 0.6);
      border: 1px solid rgba(120, 200, 120, 0.15);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      text-align: center;
      animation: fadeIn 1.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .title {
      font-size: 18px;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.7;
    }

    .track {
      font-size: 22px;
      margin-top: 10px;
      font-weight: 600;
    }

    .cover {
      margin: 20px auto;
      width: 180px;
      height: 180px;
      border-radius: 16px;
      background: linear-gradient(135deg, #3d6b3f, #1e3a22);
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .controls {
      margin-top: 20px;
    }

    .play-btn {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #7bbf6a, #3e7f4f);
      color: white;
      font-size: 26px;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(0,0,0,0.5);
      transition: 0.2s;
    }

    .play-btn:hover {
      transform: scale(1.1);
    }

    .progress {
      margin-top: 20px;
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      cursor: pointer;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #8fe388;
      border-radius: 10px;
    }

    .time {
      margin-top: 8px;
      font-size: 12px;
      opacity: 0.6;
      display: flex;
      justify-content: space-between;
    }

  </style>
</head>
<body>

<div class="card">
  <div class="title">Залесский фермер</div>
  <div class="track">39k</div>

  <div class="cover">🌿</div>

  <div class="controls">
    <button class="play-btn" id="play">▶</button>

    <div class="progress" id="progress">
      <div class="progress-bar" id="bar"></div>
    </div>

    <div class="time">
      <span id="current">0:00</span>
      <span id="duration">0:00</span>
    </div>
  </div>
</div>

<audio id="audio" src="39k.m4a"></audio>

<script>
const audio = document.getElementById('audio');
const playBtn = document.getElementById('play');
const bar = document.getElementById('bar');
const progress = document.getElementById('progress');
const current = document.getElementById('current');
const duration = document.getElementById('duration');

playBtn.onclick = () => {
  if (audio.paused) {
    audio.play();
    playBtn.innerHTML = '⏸';
  } else {
    audio.pause();
    playBtn.innerHTML = '▶';
  }
};

audio.addEventListener('timeupdate', () => {
  const percent = (audio.currentTime / audio.duration) * 100;
  bar.style.width = percent + "%";

  current.textContent = formatTime(audio.currentTime);
});

audio.addEventListener('loadedmetadata', () => {
  duration.textContent = formatTime(audio.duration);
});

progress.onclick = (e) => {
  const width = progress.clientWidth;
  const clickX = e.offsetX;
  audio.currentTime = (clickX / width) * audio.duration;
};

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60).toString().padStart(2, '0');
  return m + ":" + s;
}
</script>

</body>
</html>
